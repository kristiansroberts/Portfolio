{% extends 'portfolio/base.html' %}
{% block title %}About | Kristian Roberts Portfolio{% endblock %}
{% block content %}
<div class="about-hero">
    <h1 class="about-name">About Me</h1>
</div>

{% if about %}
<div class="about-resume">
    <a href="{{ about.resume_link|default:'/static/files/resume.pdf' }}" target="_blank">Download my Resume</a>
</div>

<div class="about-intro">
    <p>{{ about.paragraph1 }}</p>
    {% if about.paragraph2 %}
    <p>{{ about.paragraph2 }}</p>
    {% endif %}
</div>
{% endif %}
{% endblock %}
